    <script>
        // دالة الإشعارات المخصصة الأنيقة البديلة لـ Alert
        function showNotification(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-card ${type}`;
            
            let iconClass = 'fa-solid fa-circle-check';
            if (type === 'error') iconClass = 'fa-solid fa-circle-xmark';
            if (type === 'warning') iconClass = 'fa-solid fa-triangle-exclamation';

            toast.innerHTML = `
                <div class="toast-icon"><i class="${iconClass}"></i></div>
                <div class="toast-content">${message}</div>
            `;
            
            container.appendChild(toast);

            // إخفاء الإشعار وتدميره تلقائياً بعد 4 ثوانٍ
            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s ease forwards';
                toast.addEventListener('animationend', () => {
                    toast.remove();
                });
            }, 4000);
        }

        // تفعيل نسيت كلمة المرور بشكل منبثق أنيق
        function triggerForgotPassword(e) {
            e.preventDefault();
            showNotification("ميزة استعادة كلمة المرور ستتوفر قريباً!", "warning");
        }

        // Toggle Password Visibility
        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }

        // Switch between Login and Register forms smoothly
        function switchForm(formType) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (formType === 'register') {
                loginForm.style.display = 'none';
                loginForm.classList.remove('fade-in');
                registerForm.style.display = 'block';
                registerForm.classList.add('fade-in');
            } else {
                registerForm.style.display = 'none';
                registerForm.classList.remove('fade-in');
                loginForm.style.display = 'block';
                loginForm.classList.add('fade-in');
            }
        }

        // Setup loading states
        function setLoading(btnId, loaderId, isLoading, defaultText) {
            const btn = document.getElementById(btnId);
            const loader = document.getElementById(loaderId);
            const textSpan = btn.querySelector('.btn-text');
            
            if (isLoading) {
                btn.disabled = true;
                textSpan.style.display = 'none';
                loader.style.display = 'block';
                btn.style.opacity = '0.8';
            } else {
                btn.disabled = false;
                textSpan.style.display = 'inline-block';
                textSpan.textContent = defaultText;
                loader.style.display = 'none';
                btn.style.opacity = '1';
            }
        }
    </script>

                await signInWithEmailAndPassword(auth, email, password);

                setTimeout(() => {
                    if (email === '0@gmail.com') {

                }, 1000);

            } catch (error) {
                console.error("Login Error: ", error);
                showNotification("خطأ في تسجيل الدخول. تأكد من صحة البيانات.", "error");
                setLoading('btn-login', 'loader-login', false, 'تسجيل دخول');
            }
        });

        // ================= Register Logic =================
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;

            if (password !== confirmPassword) {
                showNotification("كلمات المرور غير متطابقة!", "warning");
                return;
            }

            setLoading('btn-register', 'loader-register', true, '');

            try {
                await new Promise(resolve => setTimeout(resolve, 1200));

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                showNotification("تم إنشاء الحساب بنجاح! أهلاً بك في منصتنا 🚀", "success");
                
                setTimeout(() => {
                    if (email === '0@gmail.com') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'p1.html';
                    }
                }, 1500);

            } catch (error) {
                console.error("Registration Error: ", error);
                let errorMessage = "حدث خطأ أثناء إنشاء الحساب.";
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = "البريد الإلكتروني مستخدم بالفعل من قبل.";
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = "كلمة المرور ضعيفة للغاية. يرجى اختيار كلمة أقوى.";
                }
                showNotification(errorMessage, "error");
                setLoading('btn-register', 'loader-register', false, 'إنشاء الحساب');
            }
        });
