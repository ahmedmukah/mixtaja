<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="theme-color" content="#194a38">
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    
    <title>Mixtaja - لوحة التحكم التعليمية</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1a4f3b;
            --primary-hover: #133b2b;
            --accent-color: #9a7b4f;
            --text-dark: #333333;
            --bg-color: #fcfbf9;
            --white: #ffffff;
            --danger: #dc3545;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background: url('logo1.png') center center/cover fixed;
            min-height: 100vh; color: var(--text-dark);
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(252, 251, 249, 0.96) 0%, rgba(245, 240, 230, 0.88) 100%);
            z-index: -1; backdrop-filter: blur(6px);
        }

        /* شريط التنقل */
        .navbar {
            background: rgba(255, 255, 255, 0.95); padding: 1rem 2rem; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }

        .brand { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); letter-spacing: 0.5px; }
        .nav-tools { display: flex; align-items: center; gap: 1.2rem; }

        .coins-badge {
            background: rgba(154, 123, 79, 0.1); border: 1px solid var(--accent-color);
            padding: 0.5rem 1rem; border-radius: 50px; display: flex; align-items: center;
            gap: 0.8rem; font-weight: 700; color: var(--primary-color);
        }
        .coins-amount { color: var(--accent-color); font-size: 1.2rem; }

        .btn-add {
            background: var(--accent-color); color: var(--white); border: none;
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
        }
        .btn-add:hover { transform: scale(1.1) rotate(90deg); background: var(--primary-color); }

        /* نظام الإشعارات العلوي */
        .notif-container { position: relative; display: flex; align-items: center; }
        .notif-bell-btn {
            background: none; border: none; color: var(--primary-color); font-size: 1.4rem;
            cursor: pointer; position: relative; padding: 5px; transition: var(--transition);
        }
        .notif-bell-btn:hover { color: var(--accent-color); transform: scale(1.05); }
        
        .notif-bell-btn.shake i { animation: bell-ring 0.6s ease-in-out infinite alternate; }
        @keyframes bell-ring {
            0% { transform: rotate(-15deg); }
            100% { transform: rotate(15deg); }
        }

        .notif-badge {
            position: absolute; top: 0; right: 0; background: var(--danger); color: var(--white);
            font-size: 0.7rem; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            border: 2px solid var(--white); box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .notif-dropdown {
            position: absolute; top: 45px; left: 0; width: 340px; background: var(--white);
            border-radius: 12px; box-shadow: 0 10px 35px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.06);
            display: none; flex-direction: column; overflow: hidden; z-index: 110;
            transform-origin: top left; animation: growDown 0.3s ease forwards;
        }
        .notif-dropdown.active { display: flex; }
        
        @keyframes growDown {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .notif-header {
            background: #faf8f5; padding: 1rem; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }
        .notif-header h4 { color: var(--primary-color); font-weight: 700; }
        .btn-clear-notif { background: none; border: none; color: #888; font-size: 0.85rem; cursor: pointer; font-weight: bold;}
        .btn-clear-notif:hover { color: var(--danger); }

        .notif-body { max-height: 280px; overflow-y: auto; }
        .notif-item {
            padding: 1rem; border-bottom: 1px solid #f5f5f5; display: flex; gap: 10px;
            align-items: flex-start; transition: var(--transition); cursor: default;
        }
        .notif-item:hover { background: #fdfcfb; }
        .notif-item i { font-size: 1.1rem; margin-top: 3px; }
        .notif-item.unread { background: rgba(26, 79, 59, 0.03); }
        .notif-item-text { display: flex; flex-direction: column; gap: 4px; }
        .notif-msg { font-size: 0.9rem; color: var(--text-dark); line-height: 1.4; font-weight: 500; }
        .notif-time { font-size: 0.75rem; color: #999; }
        
        .notif-empty { padding: 2rem; text-align: center; color: #aaa; font-weight: bold; font-size: 0.95rem; }

        .btn-logout { background: none; border: none; color: var(--danger); font-weight: 700; cursor: pointer; font-size: 1rem; transition: var(--transition); }
        .btn-logout:hover { opacity: 0.8; }

        /* الكورسات والمحتوى الرئيسي */
        .container { max-width: 1200px; margin: 2.5rem auto; padding: 0 2rem; }
        .section-title {
            margin-bottom: 2rem; color: var(--primary-color); font-size: 1.6rem; font-weight: 800;
            border-right: 5px solid var(--accent-color); padding-right: 12px;
        }

        .courses-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem;
        }

        .course-card {
            background: var(--white); border-radius: 16px; overflow: hidden;
            box-shadow: var(--shadow); transition: var(--transition); border: 1px solid rgba(0,0,0,0.04);
            position: relative; display: flex; flex-direction: column;
        }
        .course-card:hover { transform: translateY(-6px); box-shadow: 0 15px 35px rgba(0,0,0,0.12); }

        .course-thumbnail {
            width: 100%; height: 180px; background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 3.5rem;
            position: relative;
        }

        /* قفل الكورس */
        .locked-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: var(--white); z-index: 2;
            backdrop-filter: blur(2px);
        }
        .locked-overlay i { font-size: 2.8rem; margin-bottom: 8px; color: var(--accent-color); }

        .course-info { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .course-title { font-size: 1.25rem; color: var(--primary-color); margin-bottom: 0.6rem; font-weight: 700; }
        .course-meta { color: #666; font-size: 0.9rem; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 6px; }
        .course-price { color: var(--accent-color); font-weight: 800; font-size: 1.15rem; }

        .btn-action {
            width: 100%; padding: 0.85rem; border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; transition: var(--transition); margin-top: 1rem; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-buy { background: var(--accent-color); color: var(--white); }
        .btn-buy:hover { background: #82663f; }
        .btn-open { background: var(--primary-color); color: var(--white); }
        .btn-open:hover { background: var(--primary-hover); }

        /* واجهة مشغل الكورس المتكاملة والمطورة */
        .course-viewer-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000;
            display: none; flex-direction: column;
        }
        .course-viewer-modal.active { display: flex; }

        .viewer-header {
            background: var(--white); padding: 1.2rem 2rem; box-shadow: 0 2px 15px rgba(0,0,0,0.04);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .viewer-title { color: var(--primary-color); font-weight: 800; font-size: 1.3rem; }
        .btn-close-viewer { background: none; border: none; font-size: 1.6rem; color: var(--danger); cursor: pointer; transition: var(--transition); }
        .btn-close-viewer:hover { transform: scale(1.1); }

        .viewer-content {
            display: grid; grid-template-columns: 1.8fr 1fr; flex: 1; overflow: hidden;
        }

        /* حاوية مشغل الفيديو المستجيبة */
        .video-section {
            background: #0b0c0d; display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; padding: 2rem; overflow-y: auto;
        }
        .video-player-container {
            width: 100%; max-width: 1000px; margin: auto; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); border-radius: 12px; overflow: hidden;
            aspect-ratio: 16 / 9; background: #000;
        }
        .video-player-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; z-index: 1;
        }

        /* زر ملء الشاشة المخصص لحاوية الحماية */
        .fullscreen-btn {
            position: absolute; bottom: 15px; left: 15px; z-index: 20;
            background: rgba(26, 79, 59, 0.85); color: white; border: none; width: 42px; height: 42px;
            border-radius: 8px; cursor: pointer; font-size: 1.2rem; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .fullscreen-btn:hover { background: var(--primary-color); transform: scale(1.05); }

        /* طبقات حماية روابط وميزات اليوتيوب - ممررة للأحداث بشكل مرن لعدم تعطيل أزرار التشغيل */
        .yt-protection-top, .yt-protection-bottom, .yt-protection-center {
            position: absolute; left: 0; right: 0; z-index: 10; pointer-events: none;
        }
        .yt-protection-top { top: 0; height: 55px; }
        .yt-protection-bottom { bottom: 0; height: 50px; }

        /* شريط الدروس والملحقات */
        .playlist-section {
            background: var(--white); border-right: 1px solid rgba(0,0,0,0.06);
            overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 2rem;
        }
        
        .playlist-title { color: var(--primary-color); border-bottom: 2px solid #f5f0e6; padding-bottom: 0.6rem; font-weight: 800; font-size: 1.15rem;}
        
        .lesson-item {
            padding: 1.1rem 1rem; background: #fcfcfc; border-radius: 10px; margin-bottom: 0.6rem;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 12px;
            border: 1px solid #eee;
        }
        .lesson-item:hover { background: #f5f5f5; transform: translateX(-3px); }
        .lesson-item.active { background: rgba(26, 79, 59, 0.08); border-color: var(--primary-color); color: var(--primary-color); font-weight: 700; }
        .lesson-item i { font-size: 1.2rem; color: var(--accent-color); }
        .lesson-item.active i { color: var(--primary-color); }
        
        .files-list { display: flex; flex-direction: column; gap: 10px; }
        .file-link {
            background: #f7f6f3; color: var(--text-dark); text-decoration: none;
            padding: 10px 15px; border-radius: 8px; font-size: 0.95rem; transition: var(--transition);
            display: flex; align-items: center; gap: 8px; border: 1px solid rgba(0,0,0,0.03); font-weight: 500;
        }
        .file-link:hover { background: var(--primary-color); color: var(--white); transform: translateX(-3px); }
        .file-link i { color: var(--accent-color); }
        .file-link:hover i { color: var(--white); }

        /* شاشات الاستجابة للأجهزة اللوحية والهواتف */
        @media (max-width: 992px) {
            .viewer-content { grid-template-columns: 1fr; }
            .video-section { padding: 1rem; }
            .playlist-section { overflow-y: visible; padding: 1.5rem; }
        }

        /* النوافذ المنبثقة العامة */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
            opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--white); border-radius: 20px; padding: 2.5rem; width: 90%; max-width: 440px;
            position: relative; transform: scale(0.8); transition: var(--transition); box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .modal-overlay.active .modal-content { animation: jelly 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes jelly {
            0% { transform: scale(0.8); } 40% { transform: scale(1.04); }
            70% { transform: scale(0.98); } 100% { transform: scale(1); }
        }

        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; color: #aaa; cursor: pointer; transition: var(--transition); }
        .close-modal:hover { color: var(--danger); }
        .modal-title { color: var(--primary-color); margin-bottom: 1.2rem; text-align: center; font-weight: 800; }
        
        .payment-instructions {
            background: rgba(154, 123, 79, 0.08); border: 1px dashed var(--accent-color);
            padding: 1.2rem; border-radius: 10px; margin-bottom: 1.5rem; text-align: center; font-size: 0.95rem; line-height: 1.5;
        }
        .payment-instructions strong { color: var(--primary-color); font-size: 1.3rem; display: block; margin-top: 6px; letter-spacing: 1px;}

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.95rem; color: var(--primary-color); }
        .form-group input { width: 100%; padding: 0.85rem; border: 1px solid #ddd; border-radius: 10px; outline: none; transition: var(--transition); font-weight: 500; }
        .form-group input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(154, 123, 79, 0.15); }
        
        .btn-submit {
            width: 100%; padding: 1rem; background: var(--primary-color); color: var(--white);
            border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 1rem; transition: var(--transition);
        }
        .btn-submit:hover { background: var(--primary-hover); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        /* شاشة التحميل اللطيفة */
        .page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s;
        }
        .spinner {
            width: 55px; height: 55px; border: 5px solid rgba(26, 79, 59, 0.15);
            border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .prevent-select { -webkit-user-select: none; -ms-user-select: none; user-select: none; }

        /* نظام توست الإشعارات الجانبية المتطور */
        .toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; }
        .custom-toast {
            background: var(--white); color: var(--text-dark); padding: 1.1rem 1.6rem; border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 14px;
            font-weight: 700; min-width: 320px; border-right: 6px solid var(--primary-color);
            transform: translateX(-140%); transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
        }
        .custom-toast.show { transform: translateX(0); }
        .custom-toast.success { border-right-color: #28a745; }
        .custom-toast.error { border-right-color: var(--danger); }
        .custom-toast.info { border-right-color: var(--accent-color); }
        .custom-toast i { font-size: 1.5rem; }
        .custom-toast.success i { color: #28a745; }
        .custom-toast.error i { color: var(--danger); }
        .custom-toast.info i { color: var(--accent-color); }
    </style>
</head>
<body class="prevent-select" oncontextmenu="return false;">

    <div class="page-loader" id="page-loader"><div class="spinner"></div></div>
    <div class="bg-overlay"></div>

    <div id="toast-container" class="toast-container"></div>

    <nav class="navbar">
        <div class="brand">Mixtaja</div>
        <div class="nav-tools">
            <div class="notif-container">
                <button class="notif-bell-btn" id="notif-bell" onclick="toggleNotifDropdown()">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notif-badge" id="notif-count" style="display: none;">0</span>
                </button>
                <div class="notif-dropdown" id="notif-dropdown">
                    <div class="notif-header">
                        <h4>الإشعارات</h4>
                        <button class="btn-clear-notif" onclick="markAllNotificationsAsRead()">تحديد كالمقروء</button>
                    </div>
                    <div class="notif-body" id="notif-items-wrapper">
                        <div class="notif-empty">لا توجد إشعارات حالياً</div>
                    </div>
                </div>
            </div>

            <div class="coins-badge">
                <span>كاشات mix</span>
                <span class="coins-amount" id="user-coins">0</span>
                <button class="btn-add" onclick="openModal('topupModal')"><i class="fa-solid fa-plus"></i></button>
            </div>
            <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">الكورسات المتاحة</h2>
        <div class="courses-grid" id="courses-container"></div>
    </main>

    <div class="course-viewer-modal" id="courseViewer">
        <div class="viewer-header">
            <div class="viewer-title" id="viewer-title">اسم الكورس</div>
            <button class="btn-close-viewer" onclick="closeCourseViewer()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="viewer-content">
            <div class="video-section">
                <div class="video-player-container" id="fullscreen-container">
                    <div class="yt-protection-top"></div>
                    <div class="yt-protection-bottom"></div>
                    
                    <iframe id="lesson-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    <button class="fullscreen-btn" onclick="toggleFullScreen()"><i class="fa-solid fa-expand"></i></button>
                </div>
            </div>
            
            <div class="playlist-section">
                <div>
                    <h3 class="playlist-title">محتوى الكورس (الدروس)</h3>
                    <div id="playlist-container"></div>
                </div>
                
                <div>
                    <h3 class="playlist-title">ملحقات الكورس</h3>
                    <div class="files-list" id="files-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="topupModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('topupModal')"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="modal-title">طلب شحن كاشات mix</h3>
            
            <div class="payment-instructions">
                يرجى تحويل المبلغ المطلوب إلى الرقم التالي:
                <strong>01124680211</strong>
                (فودافون كاش أو أي محفظة إلكترونية)
            </div>

            <form id="topup-form">
                <div class="form-group">
                    <label for="amount">المبلغ المطلوب (كاش mix)</label>
                    <input type="number" id="amount" required placeholder="أدخل عدد الكاشات">
                </div>
                <div class="form-group">
                    <label for="phone">الرقم المحول منه</label>
                    <input type="text" id="phone" required placeholder="أدخل رقم هاتفك">
                </div>
                <div class="form-group">
                    <label for="receipt">صورة الإيصال / التحويل</label>
                    <input type="file" id="receipt" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit-topup">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script>
        // فتح وإغلاق النوافذ المنبثقة العامة
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
            if(id === 'topupModal') document.getElementById('topup-form').reset();
        }
        
        // فتح وإغلاق قائمة الإشعارات المنسدلة
        function toggleNotifDropdown() {
            const dropdown = document.getElementById('notif-dropdown');
            dropdown.classList.toggle('active');
            if(dropdown.classList.contains('active')) {
                document.getElementById('notif-bell').classList.remove('shake');
            }
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) event.target.classList.remove('active');
            if (!event.target.closest('.notif-container')) {
                document.getElementById('notif-dropdown').classList.remove('active');
            }
        }

        // كود ملء الشاشة المتطور والمستجيب لحاوية الفيديو بالكامل
        function toggleFullScreen() {
            const container = document.getElementById("fullscreen-container");
            const icon = document.querySelector('.fullscreen-btn i');
            
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) { container.requestFullscreen(); }
                else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
                else if (container.msRequestFullscreen) { container.msRequestFullscreen(); }
                icon.classList.remove('fa-expand');
                icon.classList.add('fa-compress');
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                else if (document.msExitFullscreen) { document.msExitFullscreen(); }
                icon.classList.remove('fa-compress');
                icon.classList.add('fa-expand');
            }
        }

        // نظام التوستات الجانبية المطورة
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            
            let icon = 'fa-circle-check';
            if (type === 'error') icon = 'fa-circle-xmark';
            if (type === 'info') icon = 'fa-circle-info';
            
            toast.innerHTML = `
                <i class="fa-solid ${icon}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 100);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 450);
            }, 4500);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, setDoc, updateDoc, arrayUnion, increment, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCv0C8nEmkov22ZM1vVtgbagQnMnQbvB24",
          authDomain: "mixtaja-45134.firebaseapp.com",
          projectId: "mixtaja-45134",
          storageBucket: "mixtaja-45134.firebasestorage.app",
          messagingSenderId: "483029414968",
          appId: "1:483029414968:web:12dda1c2c61b199916a2cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let userMixCash = 0;
        let unlockedCourses = [];
        let allLiveCourses = [];
        let currentLoadedNotifications = [];

        // 1. طلب إذن إشعارات جوجل من المتصفح عند بدء التشغيل والاتصال
        function requestSystemNotificationPermission() {
            if ("Notification" in window) {
                if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            window.showToast("تم تفعيل إشعارات النظام بنجاح لتلقي تحديثات الأدمن الفورية! 🔔", "success");
                        }
                    });
                }
            }
        }

        // مراقبة حالة تسجيل الدخول وبناء بيانات المستخدم والاتصال بالخادم
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                currentUser = user;
                requestSystemNotificationPermission();
                
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        userMixCash = data.mixCash || 0;
                        unlockedCourses = data.unlockedCourses || [];
                        document.getElementById('user-coins').innerText = userMixCash;
                        
                        renderCourses();
                        
                        document.getElementById('page-loader').style.opacity = '0';
                        setTimeout(() => document.getElementById('page-loader').style.display = 'none', 500);
                    } else {
                        setDoc(userRef, { email: user.email, mixCash: 0, unlockedCourses: [] }, { merge: true });
                    }
                });

                listenToCoursesLive();
                listenToNotificationsLive();
            }
        });

        // 2. جلب قائمة الكورسات المتاحة بالوقت الفعلي من الـ Firestore
        function listenToCoursesLive() {
            onSnapshot(collection(db, "courses"), (snapshot) => {
                allLiveCourses = [];
                snapshot.forEach((courseDoc) => {
                    const courseData = courseDoc.data();
                    courseData.id = courseDoc.id;
                    allLiveCourses.push(courseData);
                });
                renderCourses();
            });
        }

        // 3. نظام مراقبة والاستماع للإشعارات الحية الخاصة بالطالب تلقائياً
        function listenToNotificationsLive() {
            const notifRef = collection(db, "users", currentUser.uid, "notifications");
            const q = query(notifRef, orderBy("timestamp", "desc"));
            
            let isFirstLoad = true;
            
            onSnapshot(q, (snapshot) => {
                let unreadCount = 0;
                const wrapper = document.getElementById('notif-items-wrapper');
                wrapper.innerHTML = '';
                currentLoadedNotifications = [];

                if (snapshot.empty) {
                    wrapper.innerHTML = '<div class="notif-empty">لا توجد إشعارات حالياً</div>';
                    document.getElementById('notif-count').style.display = 'none';
                    return;
                }

                snapshot.forEach((docNotif) => {
                    const notif = docNotif.data();
                    notif.id = docNotif.id;
                    currentLoadedNotifications.push(notif);

                    if (!notif.read) {
                        unreadCount++;
                    }

                    // تصميم أيقونات مخصصة حسب نوع الإشعار المستلم
                    let icon = '<i class="fa-solid fa-bell" style="color: var(--accent-color)"></i>';
                    if(notif.type === 'charge') icon = '<i class="fa-solid fa-wallet" style="color: #28a745"></i>';
                    if(notif.type === 'buy') icon = '<i class="fa-solid fa-graduation-cap" style="color: var(--primary-color)"></i>';

                    const itemHTML = `
                        <div class="notif-item ${!notif.read ? 'unread' : ''}">
                            ${icon}
                            <div class="notif-item-text">
                                <span class="notif-msg">${notif.message}</span>
                                <span class="notif-time">${formatDate(notif.timestamp)}</span>
                            </div>
                        </div>
                    `;
                    wrapper.innerHTML += itemHTML;
                });

                // تحديث الشارة وجرس التنبيه
                const badge = document.getElementById('notif-count');
                if (unreadCount > 0) {
                    badge.innerText = unreadCount;
                    badge.style.display = 'flex';
                    if (!isFirstLoad) {
                        document.getElementById('notif-bell').classList.add('shake');
                        
                        // إرسال إشعار نظام رسمي فوري عبر ميزات Google للمتصفح
                        const latestNotif = currentLoadedNotifications[0];
                        if (Notification.permission === "granted") {
                            new Notification("منصة Mixtaja", {
                                body: latestNotif.message,
                                icon: 'logo1.png',
                                dir: 'rtl'
                            });
                        }
                        window.showToast(latestNotif.message, "info");
                    }
                } else {
                    badge.style.display = 'none';
                    document.getElementById('notif-bell').classList.remove('shake');
                }

                isFirstLoad = false;
            });
        }

        // تحديث حالة جميع الإشعارات غير المقروءة إلى مقروءة عند الضغط على الزر
        window.markAllNotificationsAsRead = async () => {
            for (let notif of currentLoadedNotifications) {
                if (!notif.read) {
                    const docRef = doc(db, "users", currentUser.uid, "notifications", notif.id);
                    await updateDoc(docRef, { read: true });
                }
            }
        };

        // دالة مساعدة لتنسيق وعرض التوقيت الزمني للإشعار بشكل مقروء ومبسط
        function formatDate(timestamp) {
            if (!timestamp) return 'الآن';
            const date = timestamp.toDate();
            return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) + ' - ' + date.toLocaleDateString('ar-EG');
        }

        // 4. بناء وعرض بطاقات الكورسات الحية ديناميكياً داخل الواجهة
        function renderCourses() {
            const container = document.getElementById('courses-container');
            container.innerHTML = '';

            if (allLiveCourses.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#888; font-weight:bold;">لا توجد كورسات متاحة على المنصة حالياً.</div>';
                return;
            }

            allLiveCourses.forEach(course => {
                const isUnlocked = unlockedCourses.includes(course.id);
                
                let actionButton = '';
                let lockOverlay = '';

                if (isUnlocked) {
                    actionButton = `<button class="btn-action btn-open" onclick="window.openCourse('${course.id}')"><i class="fa-solid fa-circle-play"></i> فتح الكورس والمشاهدة</button>`;
                } else {
                    lockOverlay = `
                        <div class="locked-overlay">
                            <i class="fa-solid fa-lock"></i>
                            <span>محتوى مقفل</span>
                        </div>
                    `;
                    actionButton = `<button class="btn-action btn-buy" onclick="window.buyCourse('${course.id}', ${course.price})"><i class="fa-solid fa-cart-shopping"></i> شراء بـ ${course.price} كاش mix</button>`;
                }

                const cardHTML = `
                    <div class="course-card">
                        <div class="course-thumbnail">
                            ${lockOverlay}
                            <i class="fa-solid fa-laptop-code"></i>
                        </div>
                        <div class="course-info">
                            <h3 class="course-title">${course.title}</h3>
                            <div class="course-meta"><i class="fa-solid fa-list-ul"></i> ${course.lessonsCount || 0} دروس</div>
                            ${!isUnlocked ? `<div class="course-price">السعر: ${course.price} كاش</div>` : '<div class="course-price" style="color:#1a4f3b">تم الشراء بنجاح <i class="fa-solid fa-check"></i></div>'}
                            ${actionButton}
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // 5. شراء الكورس المختار واقتطاع رصيد الكاشات مع إضافة إشعار محلي فوري
        window.buyCourse = async (courseId, price) => {
            if (userMixCash >= price) {
                const confirmBuy = confirm(`هل أنت متأكد من رغبتك في شراء هذا الكورس واقتطاع ${price} كاش من رصيدك؟`);
                if(confirmBuy){
                    try {
                        const userRef = doc(db, "users", currentUser.uid);
                        await updateDoc(userRef, {
                            mixCash: increment(-price),
                            unlockedCourses: arrayUnion(courseId)
                        });

                        // تسجيل تفاصيل الفاتورة في إشعارات المستخدم كتوثيق رسمي محمي له
                        const notifRef = collection(db, "users", currentUser.uid, "notifications");
                        const course = allLiveCourses.find(c => c.id === courseId);
                        await setDoc(doc(notifRef), {
                            message: `🎉 تم الاشتراك بنجاح في كورس: (${course.title}) واقتطاع ${price} كاش من رصيدك.`,
                            timestamp: new Date(),
                            read: false,
                            type: 'buy'
                        });

                        window.showToast("تهانينا! تم شراء الكورس بنجاح وتفعيل المحتوى. 🎉", "success");
                    } catch (error) {
                        console.error("Error buying course:", error);
                        window.showToast("عفواً، فشلت عملية الشراء. حاول مرة أخرى لاحقاً.", "error");
                    }
                }
            } else {
                window.showToast("عفواً، رصيدك من كاشات mix غير كافٍ للاشتراك. يرجى الشحن أولاً! ❌", "error");
            }
        };

        // 6. تشغيل الكورس المفتوح وتجهيز البلاي ليست والملخصات
        window.openCourse = (courseId) => {
            const course = allLiveCourses.find(c => c.id === courseId);
            if(!course) return;

            document.getElementById('viewer-title').innerText = course.title;
            
            const playlistContainer = document.getElementById('playlist-container');
            playlistContainer.innerHTML = '';
            
            if(course.lessons && course.lessons.length > 0) {
                course.lessons.forEach((lesson, index) => {
                    const isActive = index === 0 ? 'active' : '';
                    playlistContainer.innerHTML += `
                        <div class="lesson-item ${isActive}" onclick="window.playLesson('${lesson.videoId}', this)">
                            <i class="fa-solid fa-circle-play"></i>
                            <span>${lesson.title}</span>
                        </div>
                    `;
                });
            } else {
                playlistContainer.innerHTML = '<span style="color:#999; font-size:0.9rem;">لا توجد دروس مرفوعة في هذا الكورس بعد.</span>';
            }

            const filesContainer = document.getElementById('files-container');
            filesContainer.innerHTML = '';
            if(course.files && course.files.length > 0){
                course.files.forEach(file => {
                    filesContainer.innerHTML += `
                        <a href="${file.link}" target="_blank" class="file-link">
                            <i class="fa-solid fa-file-arrow-down"></i> ${file.name}
                        </a>
                    `;
                });
            } else {
                filesContainer.innerHTML = '<span style="color:#999; font-size:0.9rem;">لا توجد ملفات أو ملخصات ملحقة حالياً.</span>';
            }

            if(course.lessons && course.lessons.length > 0){
                setIframeSource(course.lessons[0].videoId);
            } else {
                document.getElementById('lesson-player').src = '';
            }

            document.getElementById('courseViewer').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.playLesson = (videoId, element) => {
            document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            setIframeSource(videoId);
        };

        function setIframeSource(videoId) {
            const iframe = document.getElementById('lesson-player');
            // تم تحسين معاملات اليوتيوب لضمان استجابة وعمل عناصر التحكم بسلاسة مع طبقات الأمان
            iframe.src = `https://www.youtube.com/embed/${videoId}?controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`;
        }

        window.closeCourseViewer = () => {
            document.getElementById('courseViewer').classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('lesson-player').src = ''; 
        };

        window.logout = () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        };

        // 7. معالجة وإرسال طلب الشحن المالي تليجرام للأدمن
        document.getElementById('topup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-topup');
            btn.innerText = 'جاري إرسال الطلب...'; btn.disabled = true;

            const amount = document.getElementById('amount').value;
            const phone = document.getElementById('phone').value;
            const fileInput = document.getElementById('receipt');
            
            const botToken = "8635550416:AAGsNM7mnjak80kQclTHdMJYKKvaiAJHNjI";
            const chatId = "5394550159";

            const caption = `🔥 طلب شحن جديد!\n\n👤 كود المستخدم (UID): ${currentUser.uid}\n📧 حساب الطالب: ${currentUser.email}\n💰 المبلغ المطلوب: ${amount} كاش mix\n📱 رقم التحويل: ${phone}`;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('caption', caption);

            if (fileInput.files.length > 0) {
                formData.append('photo', fileInput.files[0]);
                try {
                    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData });
                    if (response.ok) {
                        closeModal('topupModal');
                        window.showToast('تم استلام طلب الشحن بنجاح! سيتم المراجعة وإضافة الرصيد قريباً. ⏳', 'info');
                    } else { 
                        window.showToast("حدث خطأ غير متوقع أثناء معالجة البيانات، حاول مرة أخرى.", "error"); 
                    }
                } catch (error) { 
                    window.showToast("فشل الاتصال بالخادم، تحقق من اتصالك بالإنترنت.", "error"); 
                }
            }
            btn.innerText = 'إرسال الطلب'; btn.disabled = false;
        });
    </script>
