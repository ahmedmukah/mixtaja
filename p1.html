<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixtaja - المشغل المحدث</title>
    <!-- استدعاء API يوتيوب -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        /* إضافة استايل المشغل */
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        #player { width: 100%; height: 100%; }
        
        /* طبقات الحماية فوق المشغل */
        .yt-cover { position: absolute; top: 0; left: 0; width: 100%; height: 80px; z-index: 10; }
        .yt-cover-bottom { position: absolute; bottom: 0; right: 0; width: 150px; height: 50px; z-index: 10; }
    </style>
</head>
<body>

    <!-- مكان المشغل -->
    <div class="video-container" id="fullscreen-container">
        <div class="yt-cover"></div>
        <div class="yt-cover-bottom"></div>
        <div id="player"></div>
    </div>

    <script>
        let player;
        
        // هذه الدالة يتم استدعاؤها تلقائياً بواسطة API يوتيوب
        function onYouTubeIframeAPIReady() {
            // قم بتغيير 'VIDEO_ID_HERE' بـ ID الفيديو الخاص بك
            createPlayer('dQw4w9WgXcQ'); 
        }

        function createPlayer(videoId) {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'fs': 0,
                    'disablekb': 1
                },
                events: {
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerError(event) {
            console.log("خطأ في المشغل، رمز الخطأ: " + event.data);
            // إذا حدث خطأ، نحاول إعادة تحميل الفيديو بعد ثانية
            setTimeout(() => {
                location.reload();
            }, 1000);
        }

        // دالة لتغيير الفيديو عند اختيار درس جديد
        window.changeVideo = (newVideoId) => {
            if (player) {
                player.loadVideoById(newVideoId);
            }
        };
    </script>

</body>
</html>
