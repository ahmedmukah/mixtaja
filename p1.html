<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="theme-color" content="#194a38">
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    
    <title>Mixtaja - لوحة التحكم</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* المتغيرات الأساسية */
        :root {
            --primary-color: #1a4f3b;
            --primary-hover: #133b2b;
            --accent-color: #9a7b4f;
            --text-dark: #333333;
            --bg-color: #fcfbf9;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: url('logo1.png') center center/cover fixed;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(252, 251, 249, 0.9) 0%, rgba(245, 240, 230, 0.8) 100%);
            z-index: -1;
            backdrop-filter: blur(5px);
        }

        /* شريط التنقل العلوي */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .nav-tools {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .coins-badge {
            background: rgba(154, 123, 79, 0.1);
            border: 1px solid var(--accent-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .coins-amount {
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .btn-add {
            background: var(--accent-color);
            color: var(--white);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-add:hover {
            transform: scale(1.1);
            background: var(--primary-color);
        }

        .btn-logout {
            background: none;
            border: none;
            color: #dc3545;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }

        /* المحتوى الرئيسي (الكورسات) */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .section-title {
            margin-bottom: 2rem;
            color: var(--primary-color);
            font-size: 1.5rem;
            border-right: 4px solid var(--accent-color);
            padding-right: 10px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .course-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .course-card:hover {
            transform: translateY(-5px);
        }

        /* حماية فيديو اليوتيوب */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* طبقات حماية لمنع الضغط والانتقال ليوتيوب */
        .yt-protection-top, .yt-protection-bottom {
            position: absolute;
            left: 0; right: 0;
            z-index: 10;
        }
        .yt-protection-top {
            top: 0; height: 60px; /* تغطية العنوان وزر المشاهدة لاحقاً */
        }
        .yt-protection-bottom {
            bottom: 0; height: 50px; /* تغطية شعار اليوتيوب والانتقال */
        }

        .course-info {
            padding: 1.5rem;
        }

        .course-title {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .course-price {
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .course-files {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .file-link {
            background: #f0f0f0;
            color: var(--text-dark);
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .file-link:hover {
            background: var(--primary-color);
            color: var(--white);
        }

        /* النوافذ المنبثقة (Modals) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            position: relative;
            transform: scale(0.8);
            transition: var(--transition);
        }

        /* التأثير الجيلاتيني */
        .modal-overlay.active .modal-content {
            animation: jelly 0.6s ease forwards;
        }

        @keyframes jelly {
            0% { transform: scale(0.8); }
            30% { transform: scale(1.05); }
            50% { transform: scale(0.95); }
            70% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            font-size: 1.5rem; color: #999;
            cursor: pointer;
        }

        .modal-title {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block; margin-bottom: 0.5rem; font-weight: 500;
        }
        .form-group input {
            width: 100%; padding: 0.8rem;
            border: 1px solid #ddd; border-radius: 8px;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .btn-submit {
            width: 100%; padding: 1rem;
            background: var(--primary-color); color: var(--white);
            border: none; border-radius: 8px;
            font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover { background: var(--primary-hover); }

        /* نافذة النجاح */
        .success-content {
            text-align: center;
            padding: 3rem 2rem;
        }
        .success-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 1rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* شاشة التحميل (Loader) */
        .page-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(26, 79, 59, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* منع التحديد والنقر بزر الماوس الأيمن لزيادة صعوبة النسخ */
        .prevent-select {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="prevent-select" oncontextmenu="return false;">

    <div class="page-loader" id="page-loader">
        <div class="spinner"></div>
    </div>

    <div class="bg-overlay"></div>

    <nav class="navbar">
        <div class="brand">Mixtaja</div>
        <div class="nav-tools">
            <div class="coins-badge">
                <span>كاشات mix</span>
                <span class="coins-amount" id="user-coins">0</span>
                <button class="btn-add" onclick="openModal('topupModal')">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
        </div>
    </nav>

    <main class="container">
        <h2 class="section-title">الكورسات المتاحة</h2>
        <div class="courses-grid" id="courses-container">
            <div class="course-card">
                <div class="video-wrapper">
                    <div class="yt-protection-top"></div>
                    <div class="yt-protection-bottom"></div>
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=0&modestbranding=1&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="course-info">
                    <h3 class="course-title">كورس تطوير الويب الشامل</h3>
                    <div class="course-price">السعر: 50 كاش mix</div>
                    <div class="course-files">
                        <a href="#" class="file-link"><i class="fa-solid fa-file-pdf"></i> ملحقات الدرس</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="topupModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal('topupModal')"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="modal-title">طلب شحن كاشات mix</h3>
            <form id="topup-form">
                <div class="form-group">
                    <label for="amount">المبلغ المطلوب (كاش mix)</label>
                    <input type="number" id="amount" required placeholder="أدخل عدد الكاشات">
                </div>
                <div class="form-group">
                    <label for="phone">الرقم المحول منه</label>
                    <input type="text" id="phone" required placeholder="أدخل رقم الهاتف">
                </div>
                <div class="form-group">
                    <label for="receipt">صورة الإيصال / التحويل</label>
                    <input type="file" id="receipt" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-submit-topup">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content success-content">
            <i class="fa-solid fa-circle-check success-icon"></i>
            <h3 class="modal-title">تم استلام طلبك بنجاح!</h3>
            <p>تم إرسال طلب الشحن وسيتم مراجعته وإضافة الكاشات قريباً.</p>
            <button class="btn-submit" onclick="closeModal('successModal')" style="margin-top: 2rem;">حسناً</button>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            if(id === 'topupModal') {
                document.getElementById('topup-form').reset();
            }
        }
        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.remove('active');
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCv0C8nEmkov22ZM1vVtgbagQnMnQbvB24",
          authDomain: "mixtaja-45134.firebaseapp.com",
          projectId: "mixtaja-45134",
          storageBucket: "mixtaja-45134.firebasestorage.app",
          messagingSenderId: "483029414968",
          appId: "1:483029414968:web:12dda1c2c61b199916a2cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // 1. التحقق من تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // طرد المستخدم وإعادته لصفحة التسجيل إذا لم يكن مسجلاً
                window.location.href = 'index.html';
            } else {
                currentUser = user;
                document.getElementById('page-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('page-loader').style.display = 'none', 500);

                // 2. الاستماع لتحديثات "كاشات mix" الخاصة بالمستخدم
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('user-coins').innerText = data.mixCash || 0;
                    } else {
                        // إذا لم تكن البيانات موجودة، يتم إنشاؤها بصفر كاش
                        setDoc(userRef, { email: user.email, mixCash: 0 }, { merge: true });
                    }
                });

                // (تجهيز لكود جلب الكورسات من قاعدة البيانات لاحقاً)
                // fetchCourses(db);
            }
        });

        // 3. دالة تسجيل الخروج
        window.logout = () => {
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        };

        // 4. إرسال الطلب عبر تيليجرام
        document.getElementById('topup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-topup');
            btn.innerText = 'جاري الإرسال...';
            btn.disabled = true;

            const amount = document.getElementById('amount').value;
            const phone = document.getElementById('phone').value;
            const fileInput = document.getElementById('receipt');
            
            const botToken = "8635550416:AAGsNM7mnjak80kQclTHdMJYKKvaiAJHNjI";
            const chatId = "5394550159";

            const caption = `🔥 طلب شحن جديد!\n\n` +
                            `👤 المستخدم: ${currentUser.email}\n` +
                            `💰 المبلغ المطلوب: ${amount} كاش mix\n` +
                            `📱 رقم التحويل: ${phone}`;

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('caption', caption);

            if (fileInput.files.length > 0) {
                formData.append('photo', fileInput.files[0]);
                try {
                    // إرسال الصورة والبيانات لتيليجرام
                    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        closeModal('topupModal');
                        openModal('successModal');
                    } else {
                        alert("حدث خطأ أثناء إرسال الطلب.");
                    }
                } catch (error) {
                    console.error("Telegram API Error:", error);
                    alert("حدث خطأ في الاتصال بالخادم.");
                }
            } else {
                alert('يرجى إرفاق صورة الإيصال');
            }

            btn.innerText = 'إرسال الطلب';
            btn.disabled = false;
        });
    </script>
</body>
</html>
